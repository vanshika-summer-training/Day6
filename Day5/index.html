<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>TREND BAZAAR</h1>

    <div class="container">

        <div class="card">
            <img src="girlstop.jpeg">
            <h2>Kaftan Style Top</h2>
            <p>₹500</p>
            <p>(50 review)</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="bag.jpeg">
            <h2>Cute Kawaii Design with Charms</h2>
            <p>₹750</p>
            <p>(20 review)</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="makeup.jpeg">
            <h2>Highly Pigmented, Smooth Blend</h2>
            <p>₹1,000</p>
            <p>(14 review)</p>
            <button>Add to Cart</button>
        </div>
        <div class="card">
            <img src="iphone.jpeg">
            <h2>Battery Health 85%</h2>
            <p>₹1,00,000</p>
            <p>(14 review)</p>
            <button>Add to Cart</button>
        </div>
    </div>

</body>
</html>
